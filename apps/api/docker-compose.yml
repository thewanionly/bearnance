services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bearnance
      POSTGRES_PASSWORD: bearnance
      POSTGRES_DB: bearnance
    ports:
      - '5433:5432'
    volumes:
      - bearnance-postgres:/var/lib/postgresql/data

volumes:
  bearnance-postgres:
